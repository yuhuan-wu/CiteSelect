# Semantic Scholar scraping config
# author_url: open the target author's Semantic Scholar profile page and copy the URL.
# Example: https://www.semanticscholar.org/author/YOUR-NAME/YOUR-AUTHOR-ID
author_url: "https://www.semanticscholar.org/author/YOUR-NAME/YOUR-AUTHOR-ID"
# author_id: optional if author_url is set. This is the numeric string at the end of the author page URL.
author_id: null

# API keys
# s2_api_key: Semantic Scholar API key. Request one at:
# https://www.semanticscholar.org/product/api
s2_api_key: "your_key"
openai_api_key: null
openrouter_api_key: "your_key_openrouter_optional" # openrouter

year_range: "2018-2025"
include_types:
  - journal
  - conference
  - preprint

page_size: 100
max_concurrency: 3
s2_qps: 3
retry: 3
include_author_citations: false
author_metrics_fallback_single: false

output:
  file_naming: "title"
  write_jsonl: true
  write_txt: true
  resume: true
  force: true

llm:
  provider: "openrouter" # openrouter or openai
  model: "openai/gpt-5.4"
  base_url: "https://openrouter.ai/api/v1"
  app_name: "CiteSelect"
  site_url: "https://github.com/"
  batch_size: 200
  temperature: 1.0
  max_tokens: 1024
  cost_cap_usd: null
  echo_stdout: false

awards:
  enabled: true
  data_dir: "academic-awards/data"
  max_workers: 8
  fuzzy_threshold: 0.94
  max_matches_per_author: 3
  llm_filter:
    enabled: true
    batch_size: 40
    max_output_tokens: 1200
    cache_path: "outputs/cache/award_llm_filter_cache.json"

export:
  output_path: "outputs/reports/representative_citations.xlsx"
  top_score_threshold: 4
  author_profiles_path: "author_profiles.yaml"
  venue_llm_filter:
    enabled: true
    batch_size: 50
    max_output_tokens: 1200
    cache_path: "outputs/cache/venue_llm_filter_cache.json"
